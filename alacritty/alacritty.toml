general.import = [
  "~/.config/alacritty/themes/themes/aura.toml"
]

[window]
opacity = 0.5 # 90% opaco (0.0=total transparente, 1.0=opaco)
blur = true
padding = { x=10, y=10 }

[colors.primary]
background = "#000000"

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"
